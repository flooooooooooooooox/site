<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A6B"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="97" height="97" rx="21" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <rect x="20" y="18" width="14" height="64" rx="3" fill="url(#bar1)" opacity="0.95"/>
  <rect x="20" y="18" width="38" height="14" rx="3" fill="url(#bar1)" opacity="0.95"/>
  <rect x="20" y="43" width="28" height="13" rx="3" fill="rgba(255,255,255,0.6)"/>
  <polygon points="62,18 53,42 62,40 50,70 74,38 62,41" fill="url(#bolt)" filter="url(#softglow)"/>
