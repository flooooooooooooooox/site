<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="boltGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background for dark-mode variant -->
  <rect width="320" height="100" fill="#0A0F1E" rx="12"/>

  <!-- Icon mark -->
  <rect x="10" y="10" width="80" height="80" rx="18" fill="url(#iconGrad2)" />
  <rect x="11.5" y="11.5" width="77" height="77" rx="17" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Letter F -->
  <text x="26" y="67" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="52" fill="white" opacity="0.95">F</text>

  <!-- Lightning bolt -->
  <polygon points="67,18 58,40 67,38 56,62 76,34 66,36" fill="url(#boltGrad2)" filter="url(#glow2)" />

  <!-- Wordmark on dark bg -->
  <text x="106" y="58" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="38" letter-spacing="-0.5" fill="white">FLOX</text>
  <text x="218" y="58" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="38" letter-spacing="-0.5" fill="#60A5FA">IA</text>

  <!-- Tagline -->
  <text x="107" y="76" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" letter-spacing="3.5" fill="rgba(255,255,255,0.45)" text-anchor="start">ERP ARTISANS</text>

  <!-- Accent line -->
  <rect x="107" y="80" width="40" height="2" rx="1" fill="#F59E0B" />
</svg>
